version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:latest\n    restart: always\n    environment:\n      POSTGRES_USER: postgres\n      POSTGRES_PASSWORD: your_password\n      POSTGRES_DB: your_database\n    ports:\n      - "5432:5432"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n\n  backend:\n    build:\n      context: ./backend\n      dockerfile: Dockerfile\n    restart: always\n    ports:\n      - "3000:3000"\n    depends_on:\n      - postgres\n    environment:\n      DATABASE_URL: postgres://postgres:your_password@postgres:5432/your_database\n\n  frontend:\n    build:\n      context: ./frontend\n      dockerfile: Dockerfile\n    restart: always\n    ports:\n      - "3001:3000"\n    depends_on:\n      - backend\n\nvolumes:\n  postgres_data: